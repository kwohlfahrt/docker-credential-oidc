on:
  pull_request: ~
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu, windows, macos]
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: set targets
        run: |
          case ${{ matrix.os }} in
            ubuntu) echo "TARGETS=x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu";;
            windows) echo "TARGETS=x86_64-pc-windows-msvc,aarch64-pc-windows-msvc";;
            macos) echo "TARGETS=x86_64-apple-darwin,aarch64-apple-darwin";;
          esac >> $GITHUB_ENV

      - name: install architecture packages
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: cache rustup
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: ${{ runner.os }}-rustup
      - run: rustup toolchain install stable --target=$TARGETS

      - uses: actions/checkout@v6
      - name: cache build
        uses: actions/cache@v5
        with:
          path: |
            ./target
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo test
      - name: build
        run: |
          IFS=, read -ra TGTS <<< "$TARGETS"
          for TGT in "${TGTS[@]}"; do
            cargo build --release --target="${TGT}"
          done

      - uses: actions/upload-artifact@v7
        if: matrix.os != 'windows'
        with:
          name: docker-credential-oidc-${{ runner.os }}
          path: |
            ./target/*/release/docker-credential-oidc
            ./target/*/release/oidc-credential-provider

      - uses: actions/upload-artifact@v7
        if: matrix.os == 'windows'
        with:
          name: docker-credential-oidc-${{ runner.os }}
          path: |
            ./target/*/release/docker-credential-oidc.exe
            ./target/*/release/oidc-credential-provider.exe

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: rename files
        run: |
          mkdir -p files/
          cp aarch64-unknown-linux-gnu/release/docker-credential-oidc files/docker-credential-oidc.linux.arm64
          cp x86_64-unknown-linux-gnu/release/docker-credential-oidc files/docker-credential-oidc.linux.amd64
          cp aarch64-unknown-linux-gnu/release/oidc-credential-provider files/oidc-credential-provider.linux.arm64
          cp x86_64-unknown-linux-gnu/release/oidc-credential-provider files/oidc-credential-provider.linux.amd64

          cp aarch64-apple-darwin/release/docker-credential-oidc files/docker-credential-oidc.macos.arm64
          cp x86_64-apple-darwin/release/docker-credential-oidc files/docker-credential-oidc.macos.amd64

          cp aarch64-pc-windows-msvc/release/docker-credential-oidc.exe files/docker-credential-oidc.windows.amd64
          cp x86_64-pc-windows-msvc/release/docker-credential-oidc.exe files/docker-credential-oidc.windows.amd64
          cp aarch64-pc-windows-msvc/release/oidc-credential-provider.exe files/oidc-credential-provider.windows.amd64
          cp x86_64-pc-windows-msvc/release/oidc-credential-provider.exe files/oidc-credential-provider.windows.amd64

      - uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            ./files/*
